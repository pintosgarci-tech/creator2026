<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0f172a;
color:white;
text-align:center;
}

header{
padding:40px 20px;
}

header h1{
font-size:32px;
margin-bottom:10px;
}

header p{
color:#94a3b8;
}

.portada{
width:100%;
max-width:900px;
margin:30px auto;
border-radius:15px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.botones{
margin-top:30px;
}

button{
padding:15px 30px;
margin:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.demo{
background:#2563eb;
color:white;
}

.demo:hover{
background:#1e40af;
}

.pago{
background:#22c55e;
color:black;
font-weight:bold;
}

.pago:hover{
background:#16a34a;
}

.seccion{
display:none;
margin-top:40px;
padding:20px;
}

input, textarea{
width:100%;
max-width:500px;
padding:12px;
margin:10px auto;
border-radius:8px;
border:none;
display:block;
font-size:15px;
}

.creado{
margin-top:20px;
background:#1e293b;
padding:20px;
border-radius:10px;
max-width:600px;
margin-left:auto;
margin-right:auto;
}
</style>
</head>
<body>

<header>
<h1>Creator Pro</h1>
<p>Crea y vende tus proyectos digitales fácilmente</p>
</header>

<img src="portada.jpg" class="portada">

<div class="botones">
<button class="demo" onclick="mostrarDemo()">Probar Demo</button>
<button class="pago" onclick="irPago()">Comprar Ahora</button>
</div>

<div class="seccion" id="demoSection">
<h2>Crear Proyecto</h2>

<input type="text" id="titulo" placeholder="Título del proyecto">
<textarea id="descripcion" placeholder="Descripción del proyecto"></textarea>
<input type="text" id="precio" placeholder="Precio (ej: 400 USD)">

<button class="demo" onclick="crearProyecto()">Crear Proyecto</button>

<div id="resultado"></div>
</div>

<script>
function mostrarDemo(){
document.getElementById("demoSection").style.display = "block";
}

function crearProyecto(){
let titulo = document.getElementById("titulo").value;
let descripcion = document.getElementById("descripcion").value;
let precio = document.getElementById("precio").value;

if(titulo === "") titulo = "Proyecto Demo";
if(descripcion === "") descripcion = "Descripción de ejemplo";
if(precio === "") precio = "400 USD";

document.getElementById("resultado").innerHTML = `
<div class="creado">
<h3>${titulo}</h3>
<p>${descripcion}</p>
<p><strong>Precio:</strong> ${precio}</p>
<p style="color:#22c55e;margin-top:10px;">Proyecto creado correctamente ✔</p>
</div>
`;
}

function irPago(){
window.location.href="https://www.mercadopago.com";
}
</script>

</body>
</html>
