<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorBoard</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
}
header{
padding:40px;
background:linear-gradient(90deg,#2563eb,#9333ea);
}
.portada{
width:250px;
margin:20px auto;
display:block;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}
button{
padding:12px 25px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin:5px;
}
.primary{background:#22c55e;color:white;}
.secondary{background:#3b82f6;color:white;}
.container{padding:30px;}
.card{
background:#1e293b;
padding:20px;
margin:15px auto;
border-radius:10px;
max-width:400px;
}
input{
padding:10px;
width:90%;
margin-top:10px;
border-radius:6px;
border:none;
}
.hidden{display:none;}
ul{list-style:none;padding:0;}
li{margin:10px 0;}
footer{
padding:20px;
font-size:12px;
opacity:0.6;
}
</style>
</head>
<body>

<header id="landing">

<h1>CreatorBoard</h1>

<!-- PORTADA -->
<img src="portada.jp" class="portada">

<p>Gestiona tus proyectos fácilmente en un solo lugar</p>

<button class="secondary" onclick="entrarDemo()">Ver Demo</button>

<a href="https://wa.me/59895916669?text=Quiero%20comprar%20CreatorBoard" target="_blank">
<button class="primary">Comprar</button>
</a>

</header>

<div id="dashboard" class="hidden container">

<h2>Panel Demo (24hs)</h2>
<p id="tiempo"></p>

<div class="card">
<input type="text" id="nuevo" placeholder="Nuevo proyecto">
<br>
<button class="primary" onclick="agregar()">Agregar</button>
</div>

<ul id="lista"></ul>

<button onclick="salir()">Salir</button>

</div>

<footer>
CreatorBoard © 2026
</footer>

<script>

function entrarDemo(){
document.getElementById("landing").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

if(!localStorage.getItem("inicio")){
localStorage.setItem("inicio", Date.now());
}

actualizarTiempo();
cargar();
}

function actualizarTiempo(){
let inicio = localStorage.getItem("inicio");
let ahora = Date.now();
let horas = 24 - Math.floor((ahora - inicio)/(1000*60*60));

if(horas <= 0){
alert("Demo finalizado. Compra la licencia para continuar.");
salir();
return;
}

document.getElementById("tiempo").innerText =
"Tiempo restante: " + horas + " horas";
}

setInterval(actualizarTiempo,60000);

function agregar(){
let valor = document.getElementById("nuevo").value;
if(valor==="") return;

let datos = JSON.parse(localStorage.getItem("datos")) || [];
datos.push(valor);
localStorage.setItem("datos", JSON.stringify(datos));
document.getElementById("nuevo").value="";
cargar();
}

function cargar(){
let lista = document.getElementById("lista");
lista.innerHTML="";
let datos = JSON.parse(localStorage.getItem("datos")) || [];

datos.forEach((d,i)=>{
let li=document.createElement("li");
li.innerHTML=d+" <button onclick='borrar("+i+")'>X</button>";
lista.appendChild(li);
});
}

function borrar(i){
let datos = JSON.parse(localStorage.getItem("datos")) || [];
datos.splice(i,1);
localStorage.setItem("datos", JSON.stringify(datos));
cargar();
}

function salir(){
document.getElementById("dashboard").classList.add("hidden");
document.getElementById("landing").classList.remove("hidden");
}

</script>

</body>
</html>
